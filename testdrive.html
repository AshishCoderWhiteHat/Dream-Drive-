    <section class="page-header text-center text-white bike-header">

        <div class="container">

            <h1>Book Your Test Drive</h1>

            <p>Experience the power before you buy</p>

        </div>

    </section>

    <section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <h3 class="mb-4 text-center">Test Drive Booking</h3>

                <div id="testMsg" class="alert alert-success d-none"> Your test drive has been booked! </div>

                <form id="testForm">

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Select Vehicle</label>

                        <select class="form-select">

                            <option>Mercedes S-Class</option>

                            <option>BMW 7 Series</option>

                            <option>Audi A8</option>

                            <option>Tesla Model S</option>

                            <option>Porsche Taycan</option>

                            <option>Kawasaki ZX-10R</option>

                            <option>Ducati Panigale v4</option>

                            <option>BMW S1000RR</option>

                            <option>Harley Davidson Iron 883</option>

                            <option>Royal Enfield Meteor 350</option>

                        </select>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">Preferred Date</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Preferred Time</label>
                        <input type="time" class="form-control">
                    </div>

                    <button class="btn btn-danger w-100"> Book Test Drive </button>

                </form>

            </div>

        </div>

    </div>

</section>

<script>

document.getElementById("testForm").addEventListener("submit", function(e){

    e.preventDefault();

    document.getElementById("testMsg").classList.remove("d-none");

});

// theme toggle
const toggleBtn = document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark-mode");
toggleBtn.textContent="☀️";
}

toggleBtn.addEventListener("click", function(){

document.body.classList.toggle("dark-mode");

if(document.body.classList.contains("dark-mode")){
localStorage.setItem("theme","dark");
toggleBtn.textContent="☀️";
}
else{
localStorage.setItem("theme","light");
toggleBtn.textContent="🌙";
}

});

</script>

</body>
